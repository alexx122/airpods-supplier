body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#12001f,#3d0066,#7200b8);

}

header{
padding:30px;
text-align:center;
font-size:2rem;
font-weight:bold;
backdrop-filter:blur(10px);
}

.container{
max-width:1100px;

padding:20px;

.products{

.card img{
width:220px;

background:rgba(255,255,255,0.1);
}

.price{
font-size:2rem;
color:#ff66cc;
margin:15px 0;
}

.btn{
display:inline-block;
padding:15px 30px;
background:#ff2ea6;
color:white;
text-decoration:none;
border-radius:999px;
font-weight:bold;
margin-top:10px;
transition:background 0.3s;
}

.btn:hover{
background:#ff1493;
}

.contact{
margin-top:40px;
text-align:center;
font-size:1.1rem;
background:rgba(0,0,0,.35);
border-radius:25px;
padding:20px;
box-shadow:0 0 30px rgba(255,0,ffffff,.35);
}

@media (max-width: 768px) {
  .products {
    grid-template-columns: 1fr;
  }
}
</style>
